name: Package GUI Executables

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-gui:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            os: macos-14
            platform_tag: macos-arm64
            bundle_path: dist/macos-arm64/wechat-scraper-gui.app
            executable_path: dist/macos-arm64/wechat-scraper-gui.app/Contents/MacOS/wechat-scraper-gui
            browser_path: dist/macos-arm64/wechat-scraper-gui.app/Contents/MacOS/ms-playwright
          - label: Windows x64
            os: windows-latest
            platform_tag: windows-x64
            bundle_path: dist/windows-x64/wechat-scraper-gui
            executable_path: dist/windows-x64/wechat-scraper-gui/wechat-scraper-gui.exe
            browser_path: dist/windows-x64/wechat-scraper-gui/ms-playwright

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Package GUI executable
        run: python scripts/package_app.py --target gui --archive

      - name: Verify packaged output
        shell: bash
        run: |
          test -d "${{ matrix.bundle_path }}"
          test -f "${{ matrix.executable_path }}"
          test -d "${{ matrix.browser_path }}"
          test -f "dist/${{ matrix.platform_tag }}/wechat-scraper-gui-${{ matrix.platform_tag }}.zip"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: wechat-scraper-gui-${{ matrix.platform_tag }}
          path: dist/${{ matrix.platform_tag }}/wechat-scraper-gui-${{ matrix.platform_tag }}.zip
          if-no-files-found: error
